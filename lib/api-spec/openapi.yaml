      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartOnboarding"
        "404":
          description: Not found

  # ─── WORKFLOW ENGINE ────────────────────────────────────────────────────────
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List all workflows
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: clientId, in: query, schema: { type: integer } }
        - { name: product, in: query, schema: { type: string } }
        - { name: stage, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
  /workflows/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get workflow by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Delete a workflow
      responses:
        "204":
          description: Deleted
  /workflows/{id}/advance:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: advanceWorkflow
      tags: [workflows]
      summary: Advance workflow to next or specific stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowAdvanceBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
  /workflows/{id}/stage-logs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getWorkflowStageLogs
      tags: [workflows]
      summary: Get stage change history for a workflow
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowStageLog"
  /workflow-templates:
    get:
      operationId: listWorkflowTemplates
