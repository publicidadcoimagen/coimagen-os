  /clients/{clientId}/notes:
    get:
      operationId: listClientNotes
      tags: [client-notes]
      summary: List notes for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientNote"
    post:
      operationId: createClientNote
      tags: [client-notes]
      summary: Create a note for a client
      parameters:
