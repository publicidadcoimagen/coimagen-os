        "404":
          description: Not found
    put:
      operationId: upsertClientOnboarding
      tags: [client-onboarding]
      summary: Create or update onboarding checklist for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientOnboardingInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientOnboarding"

  /clients/{clientId}/timeline:
    get:
      operationId: listClientTimeline
      tags: [client-timeline]
      summary: List timeline events for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
