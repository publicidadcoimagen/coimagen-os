components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: string
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    # ── CLIENT ────────────────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        industry: { type: ["string", "null"] }
        status: { type: string, enum: [active, inactive, prospect] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    ClientInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        industry: { type: string }
        status: { type: string, enum: [active, inactive, prospect], default: prospect }
        notes: { type: string }
    ClientUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        industry: { type: string }
        status: { type: string, enum: [active, inactive, prospect] }
        notes: { type: string }

    # ── PROJECT ───────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        clientId: { type: ["integer", "null"] }
        clientName: { type: ["string", "null"] }
        status: { type: string, enum: [planning, active, paused, completed, cancelled] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        dueDate: { type: ["string", "null"] }
        budget: { type: ["number", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    ProjectInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        clientId: { type: integer }
        status: { type: string, enum: [planning, active, paused, completed, cancelled], default: planning }
        priority: { type: string, enum: [low, medium, high, urgent], default: medium }
        dueDate: { type: string }
        budget: { type: number }
    ProjectUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        clientId: { type: integer }
        status: { type: string, enum: [planning, active, paused, completed, cancelled] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        dueDate: { type: string }
        budget: { type: number }

    # ── AGENT ─────────────────────────────────────────────────────────────────
    Agent:
      type: object
      required: [id, name, role, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        role: { type: string }
        specialty: { type: ["string", "null"] }
        status: { type: string, enum: [active, inactive] }
        description: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    AgentInput:
      type: object
      required: [name, role]
      properties:
        name: { type: string, minLength: 1 }
        role: { type: string, minLength: 1 }
        specialty: { type: string }
        status: { type: string, enum: [active, inactive], default: active }
        description: { type: string }
    AgentUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        role: { type: string }
        specialty: { type: string }
        status: { type: string, enum: [active, inactive] }
        description: { type: string }

    # ── TASK ──────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        projectId: { type: ["integer", "null"] }
        projectName: { type: ["string", "null"] }
        agentId: { type: ["integer", "null"] }
        agentName: { type: ["string", "null"] }
        status: { type: string, enum: [todo, in_progress, review, done, cancelled] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        dueDate: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    TaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        projectId: { type: integer }
        agentId: { type: integer }
        status: { type: string, enum: [todo, in_progress, review, done, cancelled], default: todo }
        priority: { type: string, enum: [low, medium, high, urgent], default: medium }
        dueDate: { type: string }
    TaskUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        projectId: { type: integer }
        agentId: { type: integer }
        status: { type: string, enum: [todo, in_progress, review, done, cancelled] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        dueDate: { type: string }

    # ── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalClients, activeClients, suspendedClients, activeProjects, openTasks, overdueTasks, completedProjectsThisMonth, totalAgents, activeClientsThisMonth, pendingApprovals, mrr, arr, totalCostsThisMonth, marginThisMonth, overdueInvoices, upcomingPayments]
      properties:
        totalClients: { type: integer }
        activeClients: { type: integer }
        suspendedClients: { type: integer }
        activeProjects: { type: integer }
        openTasks: { type: integer }
        overdueTasks: { type: integer }
        completedProjectsThisMonth: { type: integer }
        totalAgents: { type: integer }
        activeClientsThisMonth: { type: integer }
        pendingApprovals: { type: integer }
        mrr: { type: number }
        arr: { type: number }
        totalCostsThisMonth: { type: number }
        marginThisMonth: { type: number }
        overdueInvoices: { type: integer }
        upcomingPayments: { type: integer }
    ClientTimeline:
      type: object
      required: [id, clientId, eventType, title, occurredAt, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        eventType: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        occurredAt: { type: string }
        createdAt: { type: string }
    ClientTimelineInput:
      type: object
      required: [title]
      properties:
        eventType: { type: string }
        title: { type: string }
        description: { type: string }
        occurredAt: { type: string }
    ClientNote:
      type: object
      required: [id, clientId, title, category, pinned, createdAt]
      properties:
        id: { type: integer }
        clientId: { type: integer }
        title: { type: string }
        category: { type: string }
        content: { type: ["string", "null"] }
        pinned: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    ClientNoteInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
        category: { type: string }
        content: { type: string }
        pinned: { type: boolean }
    ClientNoteUpdate:
      type: object
      properties:
        title: { type: string }
        category: { type: string }
        content: { type: string }
        pinned: { type: boolean }
    ActivityEntry:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [client_added, project_created, project_completed, task_done, agent_assigned] }
        description: { type: string }
        entityName: { type: ["string", "null"] }
        createdAt: { type: string }
    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count: { type: integer }

    # ── PROSPECT ──────────────────────────────────────────────────────────────
    Prospect:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        industry: { type: ["string", "null"] }
        status: { type: string, enum: [lead, qualified, disqualified, converted] }
        source: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    ProspectInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        industry: { type: string }
        status: { type: string, enum: [lead, qualified, disqualified, converted], default: lead }
        source: { type: string }
        notes: { type: string }
    ProspectUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        industry: { type: string }
        status: { type: string, enum: [lead, qualified, disqualified, converted] }
        source: { type: string }
        notes: { type: string }

    # ── DIAGNOSIS ─────────────────────────────────────────────────────────────
    Diagnosis:
      type: object
      required: [id, title, status, type, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        prospectId: { type: ["integer", "null"] }
        clientId: { type: ["integer", "null"] }
        content: { type: ["string", "null"] }
        status: { type: string, enum: [draft, pending_approval, approved, rejected, executed, archived] }
        type: { type: string }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    DiagnosisInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        prospectId: { type: integer }
        clientId: { type: integer }
        content: { type: string }
        status: { type: string, enum: [draft, pending_approval, approved, rejected, executed, archived], default: draft }
        type: { type: string, default: diagnosis }
    DiagnosisUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        prospectId: { type: integer }
        clientId: { type: integer }
        content: { type: string }
        status: { type: string, enum: [draft, pending_approval, approved, rejected, executed, archived] }
        type: { type: string }

    # ── PROPOSAL ──────────────────────────────────────────────────────────────
    Proposal:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        prospectId: { type: ["integer", "null"] }
        clientId: { type: ["integer", "null"] }
        amount: { type: ["number", "null"] }
        status: { type: string, enum: [draft, sent, accepted, rejected] }
        notes: { type: ["string", "null"] }
        validUntil: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
    ProposalInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        prospectId: { type: integer }
        clientId: { type: integer }
        amount: { type: number }
        status: { type: string, enum: [draft, sent, accepted, rejected], default: draft }
        notes: { type: string }
        validUntil: { type: string }
    ProposalUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        prospectId: { type: integer }
