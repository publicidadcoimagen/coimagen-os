    patch:
      operationId: updateAgent
      tags: [agents]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    delete:
      operationId: deleteAgent
      tags: [agents]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /agents/{id}/prompt-versions:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listAgentPromptVersions
      tags: [agents]
      summary: List prompt versions for an agent
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPromptVersion"
    post:
      operationId: createAgentPromptVersion
      tags: [agents]
      summary: Save a new prompt version
      requestBody:
        required: true
        content:
          application/json:
            schema:
