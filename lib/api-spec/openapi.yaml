openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: COIMAGEN OS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: clients
  - name: client-access
  - name: client-brand
  - name: client-onboarding
  - name: projects
  - name: agents
  - name: tasks
  - name: dashboard
  - name: prospects
  - name: diagnoses
  - name: proposals
  - name: approvals
  - name: invoices
  - name: subscriptions
  - name: revenue
  - name: costs
  - name: audit
  - name: config
