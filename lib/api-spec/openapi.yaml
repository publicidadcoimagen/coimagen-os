openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: COIMAGEN OS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: public
  - name: clients
  - name: client-access
  - name: client-brand
  - name: client-onboarding
  - name: projects
  - name: agents
  - name: tasks
  - name: dashboard
  - name: prospects
  - name: diagnoses
  - name: proposals
  - name: approvals
  - name: invoices
  - name: subscriptions
  - name: revenue
  - name: costs
  - name: audit
  - name: config
  - name: Auth
  - name: admin
  - name: backlog
  - name: daily-sprints
  - name: roadmap
  - name: bugs
  - name: ideas
  - name: automations

paths:
  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to returnTo or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
        '401':
          description: Token did not contain usable claims.
        '500':
          description: Token exchange failed.
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'


  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PUBLIC (unauthenticated) ───────────────────────────────────────────────
  /public/digital-diagnosis:
    post:
      operationId: submitDigitalDiagnosis
      tags: [public]
      summary: Analyze a business website and generate a digital diagnosis report (no auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalDiagnosisSubmission"
      responses:
        "200":
          description: Diagnosis generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalDiagnosisResult"
        "400":
          description: Invalid request
        "502":
          description: Analysis failed
  /public/digital-diagnosis/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getPublicDigitalDiagnosis
      tags: [public]
      summary: Fetch a completed digital diagnosis by its public token (no auth required, for the results page / emailed link)
      responses:
        "200":
          description: Diagnosis found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalDiagnosisPublicView"
        "404":
          description: Not found

  # ─── CLIENTS ───────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ─── CLIENT ACCESS VAULT ───────────────────────────────────────────────────
  /clients/{clientId}/access:
    get:
      operationId: listClientAccess
      tags: [client-access]
      summary: List access records for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientAccess"
    post:
      operationId: createClientAccess
      tags: [client-access]
      summary: Create an access record
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientAccessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAccess"
  /clients/{clientId}/access/{id}:
    patch:
      operationId: updateClientAccess
      tags: [client-access]
      summary: Update an access record
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientAccessUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAccess"
        "404":
          description: Not found
    delete:
      operationId: deleteClientAccess
      tags: [client-access]
      summary: Delete an access record
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  # ─── CLIENT BRAND ASSETS ───────────────────────────────────────────────────
  /clients/{clientId}/brand:
    get:
      operationId: getClientBrand
      tags: [client-brand]
      summary: Get brand assets for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBrand"
        "404":
          description: Not found
    put:
      operationId: upsertClientBrand
      tags: [client-brand]
      summary: Create or update brand assets for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientBrandInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBrand"

  # ─── CLIENT ONBOARDING ──────────────────────────────────────────────────────
  /clients/{clientId}/onboarding:
    get:
      operationId: getClientOnboarding
      tags: [client-onboarding]
      summary: Get onboarding checklist for a client
      parameters:
        - { name: clientId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
