      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmartOnboardingUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartOnboarding"
